version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: projectflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: projectflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - projectflow-network

  backend:
    build: ./backend
    container_name: projectflow-api
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: projectflow_db
      JWT_SECRET: secret123
    networks:
      - projectflow-network

  frontend:
    build: ./frontend
    container_name: projectflow-ui
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - projectflow-network

  nginx:
    image: nginx:alpine
    container_name: projectflow-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - projectflow-network

  redis:
    image: redis:7-alpine
    container_name: projectflow-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - projectflow-network

volumes:
  postgres_data:

networks:
  projectflow-network: