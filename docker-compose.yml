version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: cafe-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: cafe_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cafe-network

  backend:
    build: ./backend
    container_name: cafe-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: cafe_db
      JWT_SECRET: secret123
    networks:
      - cafe-network

  frontend:
    build: ./frontend
    container_name: cafe-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cafe-network

  nginx:
    image: nginx:alpine
    container_name: cafe-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - cafe-network

  redis:
    image: redis:7-alpine
    container_name: cafe-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - cafe-network

  prometheus:
    image: prom/prometheus
    container_name: cafe-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    networks:
      - cafe-network

  grafana:
    image: grafana/grafana
    container_name: cafe-grafana
    restart: always
    ports:
      - "3001:3000"
    networks:
      - cafe-network

volumes:
  postgres_data:

networks:
  cafe-network: