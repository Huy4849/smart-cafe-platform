services:
  postgres:
    image: postgres:15
    container_name: projectflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: cafe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - projectflow-network

  redis:
    image: redis:7-alpine
    container_name: projectflow-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - projectflow-network

  backend:
    build: ./backend
    container_name: projectflow-api
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: cafe_db
      JWT_SECRET: abc123
    command: node --watch server.js
    networks:
      - projectflow-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      target: build
    container_name: projectflow-ui
    restart: always
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - projectflow-network

  nginx:
    image: nginx:alpine
    container_name: projectflow-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - projectflow-network

volumes:
  postgres_data:


networks:
  projectflow-network:
